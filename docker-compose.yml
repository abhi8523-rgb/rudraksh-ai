# ============================================================
# Rudraksh AI — Docker Compose Orchestration
# ============================================================
# Launch: docker compose up --build
# Stop:   docker compose down
# Reset:  docker compose down -v (WARNING: deletes all data)
# ============================================================

services:
  # ---- Local LLM Server ----
  ollama:
    image: ollama/ollama:latest
    container_name: rudraksh-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:11434/api/tags || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s
    # Uncomment below for NVIDIA GPU support:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  # ---- Vector Database ----
  chromadb:
    image: chromadb/chroma:latest
    container_name: rudraksh-chromadb
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ALLOW_RESET=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/v1/heartbeat || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s

  # ---- Intelligence Engine (FastAPI) ----
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rudraksh-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8001}:8000"
    depends_on:
      ollama:
        condition: service_healthy
      chromadb:
        condition: service_healthy
    volumes:
      - ./uploads:/app/uploads
      - ./audit_logs:/app/audit_logs
      - ./sandbox:/app/sandbox
    env_file:
      - .env
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ---- Dashboard (Next.js) ----
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: rudraksh-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      backend:
        condition: service_healthy
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:${BACKEND_PORT:-8001}
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

# ---- Persistent Storage ----
volumes:
  ollama_data:
    driver: local
  chroma_data:
    driver: local
