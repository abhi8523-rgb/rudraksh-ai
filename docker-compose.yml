# ============================================================
# Neel AI — Docker Compose Orchestration
# ============================================================
# Launch: docker compose up --build
# Stop:   docker compose down
# Reset:  docker compose down -v (WARNING: deletes all data)
# ============================================================

services:
  # ---- Local LLM Server ----
  ollama:
    image: ollama/ollama:latest
    container_name: neel-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:11434/api/tags || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s

  # ---- Vector Database ----
  chromadb:
    image: chromadb/chroma:latest
    container_name: neel-chromadb
    restart: unless-stopped
    ports:
      - "8100:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ALLOW_RESET=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/v1/heartbeat || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s

  # ---- Intelligence Engine (FastAPI) ----
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: neel-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8001}:8001"
    depends_on:
      ollama:
        condition: service_healthy
      chromadb:
        condition: service_healthy
    volumes:
      - ./data/uploads:/app/data/uploads
      - ./data/db:/app/data/db
      - ./data/sandbox:/app/data/sandbox
    env_file:
      - .env
    environment:
      - NEEL_OLLAMA_BASE_URL=http://ollama:11434
      - NEEL_CHROMA_HOST=chromadb
      - NEEL_CHROMA_PORT=8000
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8001/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ---- Dashboard (Next.js) ----
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: neel-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      backend:
        condition: service_healthy
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:${BACKEND_PORT:-8001}
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

# ---- Persistent Storage ----
volumes:
  ollama_data:
    driver: local
  chroma_data:
    driver: local
